<body>
    <!---First List--->
    <h1>My lists</h1>
   <p style="color:blue;"><em><u>First list:</u></em></p> 
   <ul style="color: blue;">
    <li><p style="color:blue;"> Sugar</p></li>
    <li><p style="color:blue;"> Spice</p></li>
    <li><p style="color:blue;"> Everything nice</p></li>
</ul>
    
    <br>
    <br>
    <br>
    <br>
     <!---Second List--->
     <p style="color:crimson;"><em><u>Second list:</u></em></p>
     <ul style="list-style:square; color: crimson;">
        <li><p style="color: crimson;"> First</p></li>
        <li><p style="color: crimson;"> Second</p></li>
        <li><p style="color: crimson;"> Third</p></li>

     </ul>
</body>
</html>
